name: Implement Experiment (Dev Agent)

on:
  workflow_dispatch:
    inputs:
      handoff_file:
        description: "Handoff spec filename (e.g. 16-04-2026-pdp-001.md)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout CRO agent repo
        uses: actions/checkout@v4

      - name: Validate handoff file exists and is safe
        run: |
          FILENAME="${{ inputs.handoff_file }}"
          # Block path traversal — filename must match DD-MM-YYYY-slug.md pattern
          if ! echo "$FILENAME" | grep -qE '^[0-9]{2}-[0-9]{2}-[0-9]{4}-[a-z0-9\-]+\.md$'; then
            echo "ERROR: Invalid filename format: $FILENAME"
            echo "Expected: DD-MM-YYYY-experiment-slug.md (e.g. 16-04-2026-pdp-001.md)"
            exit 1
          fi
          SPEC="dev-agent/handoffs/$FILENAME"
          if [ ! -f "$SPEC" ]; then
            echo "ERROR: Handoff spec not found: $SPEC"
            echo "Available specs:"
            ls -la dev-agent/handoffs/ || echo "(empty)"
            exit 1
          fi
          echo "HANDOFF_SPEC=$SPEC" >> $GITHUB_ENV

      - name: Extract experiment ID from filename
        run: |
          # Filename format: DD-MM-YYYY-experiment-id.md
          FILENAME="${{ inputs.handoff_file }}"
          # Remove date prefix and .md suffix
          SLUG=$(echo "$FILENAME" | sed 's/^[0-9-]*//;s/\.md$//')
          BRANCH="experiment/${SLUG}"
          echo "BRANCH_NAME=$BRANCH" >> $GITHUB_ENV
          echo "Branch: $BRANCH"

      - name: Checkout theme repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SHOPIFY_THEME_REPO }}
          token: ${{ secrets.THEME_REPO_PAT }}
          path: theme

      - name: Pull latest theme from Shopify
        run: |
          cd theme
          shopify theme pull --store ${{ secrets.SHOPIFY_SHOP_URL }} \
            --theme ${{ secrets.SHOPIFY_THEME_ID }} \
            --nodelete
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}

      - name: Create experiment branch
        run: |
          cd theme
          git checkout -b ${{ env.BRANCH_NAME }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run dev agent
        run: |
          cd theme
          claude --print \
            --allowedTools "Read,Write,Edit" \
            --model claude-sonnet-4-6 \
            -p "Read $(pwd)/../dev-agent/CLAUDE.md for your instructions. Then read $(pwd)/../${{ env.HANDOFF_SPEC }} and implement it. Theme files are in the current directory."
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Check for changes
        run: |
          cd theme
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes made by dev agent"
            exit 1
          fi

      - name: Read PR description
        id: pr_desc
        run: |
          cd theme
          if [ -f "cro-agent/dev-agent/handoffs/pr-description.md" ]; then
            # First line is title, rest is body
            TITLE=$(head -1 cro-agent/dev-agent/handoffs/pr-description.md)
            BODY=$(tail -n +2 cro-agent/dev-agent/handoffs/pr-description.md)
          else
            TITLE="Experiment: ${{ env.BRANCH_NAME }}"
            BODY="Automated implementation from handoff spec: ${{ inputs.handoff_file }}"
          fi
          echo "pr_title=$TITLE" >> $GITHUB_OUTPUT
          # Write body to file for multiline support
          echo "$BODY" > /tmp/pr-body.md

      - name: Commit, push, and create PR
        run: |
          cd theme
          git config user.name "CRO Dev Agent"
          git config user.email "cro-dev-agent@noreply.github.com"
          git add -A
          git commit -m "Implement ${{ env.BRANCH_NAME }}"
          git push origin ${{ env.BRANCH_NAME }}
          gh pr create \
            --title "${{ steps.pr_desc.outputs.pr_title }}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head ${{ env.BRANCH_NAME }}
        env:
          GH_TOKEN: ${{ secrets.THEME_REPO_PAT }}
